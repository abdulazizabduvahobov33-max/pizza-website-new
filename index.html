<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PizzaShop</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-[#2a0f06] to-[#0a0503] text-white font-sans overflow-x-hidden">

<!-- HEADER -->
<header class="flex justify-between items-center max-w-7xl mx-auto py-6 px-6 relative">
  <h1 class="text-4xl font-bold text-orange-500 tracking-wider animate-pulse">PizzaShop</h1>

  <!-- Desktop -->
  <nav class="hidden md:flex gap-10 font-semibold">
    <a href="index.html" class="hover:text-orange-400">Home</a>
    <a href="menu.html" class="hover:text-orange-400">Menu</a>
    <a href="about.html" class="hover:text-orange-400">About</a>
    <a href="cart.html" class="hover:text-orange-400">Cart 🛒</a>
  </nav>

  <!-- Burger -->
  <button id="burger" class="md:hidden text-2xl">☰</button>

  <!-- Mobile -->
  <div id="mobileMenu" class="hidden absolute top-full left-0 w-full bg-[#1a0502] flex flex-col items-center gap-6 py-6 z-50">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart 🛒</a>
  </div>
</header>

<!-- HERO -->
<section class="flex flex-col lg:flex-row justify-between items-center max-w-7xl mx-auto px-6 py-12 gap-12">

  <div class="flex-1">
    <h1 class="text-5xl font-bold leading-tight">
      The Fastest <span class="text-orange-400">Pizza Delivery</span>
    </h1>

    <p class="text-gray-300 mt-4 text-lg">
      Juicy pizza delivered to your family in 30 minutes 🍕
    </p>

    <button class="mt-6 px-6 py-3 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400 shadow-lg hover:scale-105 transition">
      Order Now
    </button>
  </div>

  <div class="flex-1">
    <img src="./foto/pizza2.png"
      class="w-full max-w-md mx-auto rounded-3xl shadow-2xl hover:scale-105 transition duration-500">
  </div>

</section>

<!-- FILTER -->
<section class="flex justify-center gap-4 py-6 flex-wrap">
  <button class="filter-btn bg-gradient-to-r from-orange-500 to-yellow-400 px-6 py-2 rounded-full shadow-lg">
    Show All
  </button>
  <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full hover:bg-[#3a130a]">Italian</button>
  <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full hover:bg-[#3a130a]">Venecia</button>
  <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full hover:bg-[#3a130a]">Meat</button>
  <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full hover:bg-[#3a130a]">Cheese</button>
</section>

<!-- CARDS -->
<section class="flex flex-wrap justify-center gap-8 max-w-7xl mx-auto px-6 pb-10">

  <!-- Italian -->
  <div class="pizza-card bg-gradient-to-br from-[#2a0f06] to-[#0a0503] w-64 p-4 rounded-2xl shadow-2xl hover:scale-105 transition" data-category="italian">
    <img src="./foto/box_pizza1.png" class="w-44 h-44 mx-auto rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center mt-3">Italian</h2>

    <div class="flex justify-between items-center mt-4">
      <button class="minus text-xl">-</button>
      <span class="count">1</span>
      <button class="plus text-xl">+</button>
      <span>$8.35</span>
    </div>

    <button class="order-btn w-full mt-4 py-2 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400"
      data-name="Italian Pizza"
      data-price="8.35">
      Order Now
    </button>
  </div>

  <!-- Venecia -->
  <div class="pizza-card bg-gradient-to-br from-[#2a0f06] to-[#0a0503] w-64 p-4 rounded-2xl shadow-2xl hover:scale-105 transition" data-category="venecia">
    <img src="./foto/box_pizza2.png" class="w-44 h-44 mx-auto rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center mt-3">Venecia</h2>

    <div class="flex justify-between items-center mt-4">
      <button class="minus text-xl">-</button>
      <span class="count">1</span>
      <button class="plus text-xl">+</button>
      <span>$7.75</span>
    </div>

    <button class="order-btn w-full mt-4 py-2 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400"
      data-name="Venecia Pizza"
      data-price="7.75">
      Order Now
    </button>
  </div>

  <!-- Meat -->
  <div class="pizza-card bg-gradient-to-br from-[#2a0f06] to-[#0a0503] w-64 p-4 rounded-2xl shadow-2xl hover:scale-105 transition" data-category="meat">
    <img src="./foto/box_pizza3.png" class="w-44 h-44 mx-auto rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center mt-3">Meat</h2>

    <div class="flex justify-between items-center mt-4">
      <button class="minus">-</button>
      <span class="count">1</span>
      <button class="plus">+</button>
      <span>$9.50</span>
    </div>

    <button class="order-btn w-full mt-4 py-2 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400"
      data-name="Meat Pizza"
      data-price="9.50">
      Order Now
    </button>
  </div>

  <!-- Cheese -->
  <div class="pizza-card bg-gradient-to-br from-[#2a0f06] to-[#0a0503] w-64 p-4 rounded-2xl shadow-2xl hover:scale-105 transition" data-category="cheese">
    <img src="./foto/box_pizza4.png" class="w-44 h-44 mx-auto rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center mt-3">Cheese</h2>

    <div class="flex justify-between items-center mt-4">
      <button class="minus">-</button>
      <span class="count">1</span>
      <button class="plus">+</button>
      <span>$8.80</span>
    </div>

    <button class="order-btn w-full mt-4 py-2 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400"
      data-name="Cheese Pizza"
      data-price="8.80">
      Order Now
    </button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
