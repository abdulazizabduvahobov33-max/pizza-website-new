<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PizzaShop</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-[#2a0f06] to-[#0a0503] text-white font-sans overflow-x-hidden">

  <!-- Header -->
  <header class="flex justify-between items-center max-w-7xl mx-auto py-6 px-6 relative">
    <h1 class="text-3xl md:text-4xl font-bold text-orange-500 tracking-wider">PizzaShop</h1>

    <!-- Desktop nav -->
    <nav class="hidden md:flex gap-10 text-white font-semibold">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About Us</a>
      <a href="cart.html">Cart 🛒</a>
    </nav>

    <!-- Login -->
    <button class="hidden md:block px-6 py-2 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400 shadow-lg hover:scale-105 transition-all">
      Log in
    </button>

    <!-- Burger -->
    <div class="md:hidden">
      <button id="burger" class="space-y-1">
        <span class="block w-6 h-0.5 bg-white"></span>
        <span class="block w-6 h-0.5 bg-white"></span>
        <span class="block w-6 h-0.5 bg-white"></span>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobileMenu" class="absolute top-full left-0 w-full bg-[#1a0502] flex flex-col items-center gap-6 py-4 hidden">
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="about.html">About Us</a>
      <a href="cart.html">Cart 🛒</a>

      <button class="px-6 py-2 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400 shadow-lg">
        Log in
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="flex flex-col lg:flex-row items-center max-w-7xl mx-auto px-6 py-12 gap-10">
    <div class="flex-1 text-center lg:text-left">
      <h1 class="text-4xl md:text-5xl font-bold">
        The Fastest <span class="text-orange-400">Pizza Delivery</span>
      </h1>
      <p class="text-gray-300 mt-4">
        Juicy pizza delivered in 30 minutes 🍕
      </p>
      <button class="mt-6 px-6 py-3 rounded-full bg-gradient-to-r from-orange-500 to-yellow-400 hover:scale-105 transition">
        Order Now
      </button>
    </div>

    <img src="./foto/pizza2.png" class="w-full max-w-md rounded-3xl shadow-2xl">
  </section>

  <!-- Filter -->
  <section class="flex justify-center gap-4 py-6 flex-wrap">
    <button class="filter-btn bg-orange-500 px-6 py-2 rounded-full">Show All</button>
    <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full">Italian</button>
    <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full">Venecia</button>
    <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full">Meat</button>
    <button class="filter-btn bg-[#2a0f06] px-6 py-2 rounded-full">Cheese</button>
  </section>

  <!-- Cards -->
  <section class="flex flex-wrap justify-center gap-6 px-6">

    <!-- Pizza -->
    <div class="pizza-card w-64 bg-[#1a0502] p-4 rounded-2xl" data-category="italian">
      <img src="./foto/box_pizza1.png" class="w-40 mx-auto">
      <h2 class="text-center text-xl mt-2">Italian</h2>

      <div class="flex justify-between mt-4">
        <button class="minus">-</button>
        <span class="count">1</span>
        <button class="plus">+</button>
        <span>$8</span>
      </div>

      <button class="w-full mt-4 bg-orange-500 py-2 rounded-full">Order</button>
    </div>

    <div class="pizza-card w-64 bg-[#1a0502] p-4 rounded-2xl" data-category="venecia">
      <img src="./foto/box_pizza2.png" class="w-40 mx-auto">
      <h2 class="text-center text-xl mt-2">Venecia</h2>

      <div class="flex justify-between mt-4">
        <button class="minus">-</button>
        <span class="count">1</span>
        <button class="plus">+</button>
        <span>$7</span>
      </div>

      <button class="w-full mt-4 bg-orange-500 py-2 rounded-full">Order</button>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
